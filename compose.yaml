services:
  convoy-api:
    container_name: convoy-api
    image: convoy/api
    pull_policy: never
    build:
      context: ./core
      dockerfile: Dockerfile.api
      target: api_dev
    ports:
      - "8000:8000"
    volumes:
      - ./core:/srv/www
    environment:
      - DATABASE_URL=postgresql+asyncpg://convoy:convoy@convoy-postgresql:5432/convoy
      - DATABASE_ECHO=false
      - BATCH_SIZE_THRESHOLD=${BATCH_SIZE_THRESHOLD:-100}
      - BATCH_TIME_THRESHOLD_SECONDS=${BATCH_TIME_THRESHOLD_SECONDS:-3600}
      - RESULT_RETENTION_DAYS=${RESULT_RETENTION_DAYS:-30}
      - CALLBACK_MAX_RETRIES=${CALLBACK_MAX_RETRIES:-5}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_TASK_QUEUE=convoy-tasks
    depends_on:
      convoy-postgresql:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
    networks:
      - temporal-network
    restart: unless-stopped

  convoy-worker:
    container_name: convoy-worker
    image: convoy/worker
    pull_policy: never
    build:
      context: ./core
      dockerfile: Dockerfile.worker
      target: worker_dev
    volumes:
      - ./core:/srv/www
      - ${AWS_DIRECTORY_PATH}:/root/.aws  # Mount AWS credentials for Bedrock integration
    environment:
      - DATABASE_URL=postgresql+asyncpg://convoy:convoy@convoy-postgresql:5432/convoy
      - DATABASE_ECHO=false
      - BATCH_SIZE_THRESHOLD=${BATCH_SIZE_THRESHOLD:-100}
      - BATCH_TIME_THRESHOLD_SECONDS=${BATCH_TIME_THRESHOLD_SECONDS:-3600}
      - BATCH_CHECK_INTERVAL_SECONDS=${BATCH_CHECK_INTERVAL_SECONDS:-30}
      - RESULT_RETENTION_DAYS=${RESULT_RETENTION_DAYS:-30}
      - CALLBACK_MAX_RETRIES=${CALLBACK_MAX_RETRIES:-5}
      - CALLBACK_HTTP_TIMEOUT_SECONDS=${CALLBACK_HTTP_TIMEOUT_SECONDS:-30}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_TASK_QUEUE=${TEMPORAL_TASK_QUEUE:-convoy-tasks}
      - AWS_PROFILE=${AWS_PROFILE}  # Add your SSO profile name
      - AWS_REGION=${AWS_REGION}  # AWS region for Bedrock
      - BEDROCK_S3_BUCKET=${BEDROCK_S3_BUCKET}  # S3 bucket for Bedrock batch inputs/outputs
      - BEDROCK_ROLE_ARN=${BEDROCK_ROLE_ARN}  # IAM role ARN for Bedrock batch processing
      - BEDROCK_S3_INPUT_PREFIX=${BEDROCK_S3_INPUT_PREFIX}  # S3 prefix for Bedrock batch inputs
      - BEDROCK_S3_OUTPUT_PREFIX=${BEDROCK_S3_OUTPUT_PREFIX}  # S3 prefix
    depends_on:
      convoy-postgresql:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
    networks:
      - temporal-network
    restart: unless-stopped

  convoy-postgresql:
    container_name: convoy-postgresql
    environment:
      POSTGRES_PASSWORD: convoy
      POSTGRES_USER: convoy
      POSTGRES_DB: convoy
    image: postgres:${POSTGRESQL_VERSION}
    networks:
      - temporal-network
    ports:
      - 5433:5432
    volumes:
      - convoy-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convoy -d convoy"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal-postgresql:
    container_name: temporal-postgresql
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    image: postgres:${POSTGRESQL_VERSION}
    networks:
      - temporal-network
    ports:
      - 5432:5432
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Temporal schema setup - runs before temporal server to initialize database
  temporal-schema-setup:
    container_name: temporal-schema-setup
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    restart: on-failure:6
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - SQL_PASSWORD=temporal
    networks:
      - temporal-network
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/sh"]
    command: /scripts/setup-postgres.sh

  temporal:
    container_name: temporal
    image: temporalio/server:${TEMPORAL_VERSION}
    depends_on:
      temporal-schema-setup:
        condition: service_completed_successfully
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - BIND_ON_IP=0.0.0.0
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    networks:
      - temporal-network
    ports:
      - 7233:7233
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 60

  # Creates the default namespace after temporal server is healthy
  temporal-create-namespace:
    container_name: temporal-create-namespace
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    restart: on-failure:5
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - DEFAULT_NAMESPACE=default
    networks:
      - temporal-network
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/sh"]
    command: /scripts/create-namespace.sh

  # Interactive admin tools for debugging/management
  temporal-admin-tools:
    container_name: temporal-admin-tools
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    networks:
      - temporal-network
    stdin_open: true
    tty: true

  temporal-ui:
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    image: temporalio/ui:${TEMPORAL_UI_VERSION}
    networks:
      - temporal-network
    ports:
      - 8080:8080

  # Mock Callback Server - receives callbacks during E2E tests
  mock-callback:
    container_name: mock-callback
    image: convoy/mock-callback
    pull_policy: never
    profiles:
      - tests
    build:
      context: ./tests
      dockerfile: Dockerfile.callback
    ports:
      - "8001:8001"
    networks:
      - temporal-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  # E2E Test Runner - only runs with --profile tests
  convoy-tests:
    container_name: convoy-tests
    image: convoy/tests
    pull_policy: never
    profiles:
      - tests
    build:
      context: ./tests
      dockerfile: Dockerfile
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://convoy-api:8000}
      - CALLBACK_SERVER_URL=${CALLBACK_SERVER_URL:-http://mock-callback:8001}
    depends_on:
      convoy-api:
        condition: service_started
      mock-callback:
        condition: service_healthy
    networks:
      - temporal-network

networks:
  temporal-network:
    driver: bridge
    name: temporal-network

volumes:
  convoy-postgres-data:
  temporal-postgres-data:
