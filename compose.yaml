services:
  core:
    container_name: api
    image: convoy/api
    pull_policy: never
    build:
      context: ./api
      target: app_dev
    ports:
      - "8000:8000"
    volumes:
      - ./api:/srv/www
    environment:
      - DATABASE_URL=postgresql+asyncpg://convoy:convoy@convoy-postgresql:5432/convoy
      - DATABASE_ECHO=false
      - BATCH_SIZE_THRESHOLD=100
      - BATCH_TIME_THRESHOLD_SECONDS=3600
      - RESULT_RETENTION_DAYS=30
      - CALLBACK_MAX_RETRIES=5
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=convoy-tasks
    depends_on:
      convoy-postgresql:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - temporal-network
    restart: unless-stopped

  convoy-worker:
    container_name: convoy-worker
    image: convoy/api
    pull_policy: never
    build:
      context: ./api
      target: app_dev
    command: uv run python -m src.temporal.worker
    volumes:
      - ./api:/srv/www
    environment:
      - DATABASE_URL=postgresql+asyncpg://convoy:convoy@convoy-postgresql:5432/convoy
      - DATABASE_ECHO=false
      - BATCH_SIZE_THRESHOLD=100
      - BATCH_TIME_THRESHOLD_SECONDS=3600
      - BATCH_CHECK_INTERVAL_SECONDS=30
      - RESULT_RETENTION_DAYS=30
      - CALLBACK_MAX_RETRIES=5
      - CALLBACK_HTTP_TIMEOUT_SECONDS=30
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=convoy-tasks
    depends_on:
      convoy-postgresql:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - temporal-network
    restart: unless-stopped

  convoy-postgresql:
    container_name: convoy-postgresql
    environment:
      POSTGRES_PASSWORD: convoy
      POSTGRES_USER: convoy
      POSTGRES_DB: convoy
    image: postgres:${POSTGRESQL_VERSION}
    networks:
      - temporal-network
    ports:
      - 5433:5432
    volumes:
      - convoy-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convoy -d convoy"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal-postgresql:
    container_name: temporal-postgresql
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    image: postgres:${POSTGRESQL_VERSION}
    networks:
      - temporal-network
    ports:
      - 5432:5432
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10
  temporal:
    container_name: temporal
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    image: temporalio/auto-setup:${TEMPORAL_VERSION}
    networks:
      - temporal-network
    ports:
      - 7233:7233
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig

  temporal-admin-tools:
    container_name: temporal-admin-tools
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    networks:
      - temporal-network
    stdin_open: true
    tty: true

  temporal-ui:
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    image: temporalio/ui:${TEMPORAL_UI_VERSION}
    networks:
      - temporal-network
    ports:
      - 8080:8080

networks:
  temporal-network:
    driver: bridge
    name: temporal-network

volumes:
  convoy-postgres-data:
  temporal-postgres-data:
